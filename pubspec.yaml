name: repertorio_flutter
description: "App para organizar, visualizar e anotar partituras em PDF com repertórios personalizados."
publish_to: "none" # ✅ Aspas simples (string literal)
version: 2.0.0+2002

environment:
  sdk: ">=3.0.0 <4.0.0" # ✅ Aspas simples

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  sembast: ^3.8.6
  path: ^1.9.1
  file_picker: ^11.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.2
  pdf: ^3.11.0
  printing: ^5.11.1
  collection: ^1.17.0
  flutter_svg: ^2.0.10
  google_mobile_ads: ^5.1.0
  flutter_native_splash: ^2.4.2
  pdfx: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.1.0
  flutter_launcher_icons: ^0.13.1 # ✅ Para ícones do app

flutter_launcher_icons: # ✅ Configuração de ícone
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # ✅ ASSETS (uma única seção)
  assets:
    - assets/icon/
    - assets/fonts/
    - assets/icon/icon.png # Ícone do app
    - assets/images/logo_splash.png
    - assets/pdf/Demonstração/Ave Maria - Piano.pdf
    - assets/pdf/Demonstração/Transferir Arquivos.pdf

  # ✅ FONTS (uma única seção)
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-Bold.ttf # Adicione se tiver
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf # Adicione se tiver
          weight: 800
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo_splash.png
  android_gravity: center
  ios_content_mode: scaleAspectFit

  android_12:
    color: "#FFFFFF"
    image: assets/images/logo_splash.png
